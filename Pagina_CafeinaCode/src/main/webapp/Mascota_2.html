<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Mascota 2 - Ros</title>
    <meta charset="UTF-8">
    <!-- Vinculamos al nuevo CSS de la mascota 2 -->
    <link rel="stylesheet" href="Mascota_2.css">
</head>

<body>

    <div class="menu">
        <img src="logo_cafeina_code.png" class="logo">

        <a href="Inicio.html">Inicio</a>
        <a href="Guia.html">Guía</a>
        <a href="Challenges.html">Challenges</a>
        <a href="Mascotas.html" class="activo">Mascota</a>
        <a href="Perfil">Perfil</a>
    </div>

    <!-- CONTENIDO -->
    <div class="contenido">

        <div class="columna-mascota">
            <!-- Actualizado al gif de Ros -->
            <img src="final_ros.gif" class="mascota-arriba">

            <!-- El nombre justo debajo del gif -->
            <h2 id="nombreMascota">Sin nombre</h2>

            <form class="formulario_r" onsubmit="return false;">
                <input type="text" id="nombre" placeholder="Escribe el nombre">
                <div class="botones-fila">
                    <button type="button" onclick="guardarNombre()">Guardar</button>
                    <!-- Corregido el nombre de la función y texto -->
                    <button type="button" onclick="borrarNombre()" style="background:red;">Borrar Nombre</button>
                </div>
            </form>
        </div>

        <div class="frase-contenedor">
            <p class="frase">"El esfuerzo de hoy es el éxito de mañana"</p>

            <div class="contenedor-racha">
                <div class="racha-texto">
                    <img src="fuego_racha.gif" class="gif-racha">
                    <span id="contadorRacha">0</span> DÍAS DE RACHA
                </div>
                <!-- El botón de racha alineado abajo por CSS -->
                <button type="button" class="btn-racha" onclick="aumentarRacha()">🔥 ¡Logro del día!</button>
            </div>
        </div>

    </div>

    <div class="footer">
        Aviso de privacidad | @2025 Cafeína Code
    </div>

    <!-- El JS se encargará de poner secuencia_ros.gif aquí si detecta que es Ros -->
    <img id="mascotaCaminando" src="" class="mascota-caminando">

    <script src="MascotasJS.js"></script>
    
</body>
</html>
